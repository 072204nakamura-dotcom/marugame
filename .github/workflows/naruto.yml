name: naruto-build

on:
  schedule:
    - cron: '0 22 * * *'   # UTC 22:00 = 日本時間 朝7:00
  workflow_dispatch: {}     # 手動実行ボタンも使えるように

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存パッケージ
        run: pip install lhafile

      - name: 鳴門ツール日次実行
        run: python scripts/naruto_daily.py

      - name: 変更をコミット
        run: |
          git config user.name "naruto-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/naruto naruto/data.json
          git commit -m "鳴門 日次更新 $(date +%Y-%m-%d)" || echo "変更なし"
          git push
