name: fukuoka-build

on:
  schedule:
    - cron: '20 22 * * *'   # UTC22:20 = JST翌朝7:20（丸亀の22:00と20分ずらして衝突回避）
  workflow_dispatch:          # 手動実行ボタン

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ライブラリ
        run: pip install lhafile pandas numpy

      - name: 表のビルド（K/Bキャッシュ更新→5表＋モーター＋うねり窓）
        run: python scripts/fukuoka_build.py

      - name: 当日出走表
        run: python scripts/fukuoka_racecard.py

      - name: コミット＆プッシュ
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "fukuoka daily build $(date -u +%F)"
          git pull --rebase origin main || true
          git push
