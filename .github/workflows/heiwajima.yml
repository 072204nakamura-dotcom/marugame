name: heiwajima-daily

# 平和島(04) 穴党ツール — 毎朝のレースカード生成
#
# cron の時刻は既存会場と重ならないように取ってある（HANDOVER §6）:
#   22:00 build(丸亀) / 22:00 naruto / 22:20 fukuoka / 22:30 tsu / 22:40 ← ここ
# UTC 22:40 = 日本時間 翌朝 7:40。
on:
  schedule:
    - cron: '40 22 * * *'
  workflow_dispatch:          # 「Run workflow」ボタンで手動実行もできる

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20       # mbraceは遅い（1ファイル約10秒）ので余裕を持たせる

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: deps
        run: pip install lhafile

      # 採点仕様の回帰テスト。ここが落ちたらビルドせず、前回のページを残す。
      - name: test
        run: python scripts/heiwajima/test_daily_build_hw.py

      - name: build
        run: python scripts/heiwajima/daily_build_hw.py

      - name: push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add heiwajima/index.html
          git diff --cached --quiet || git commit -m "heiwajima daily build $(date +%F)"
          git pull --rebase origin main || true
          git push
